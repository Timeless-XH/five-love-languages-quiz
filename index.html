<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱的五种语言 · 互动测验（Winnie简版）</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        love: { 50:'#fff5f6', 100:'#ffe0e4', 200:'#ffc2c9', 300:'#ff939e', 400:'#ff5e70', 500:'#e94d5f', 600:'#c93a4b', 700:'#a62d3d', 800:'#8a2735', 900:'#722533' },
        gold: { 50:'#fef9ef', 100:'#fdf0d5', 200:'#faddaa', 300:'#f5c675', 400:'#efa83e', 500:'#e79217', 600:'#cc760d', 700:'#a55c0e', 800:'#854914', 900:'#6e3c12' },
      },
    }
  }
}
</script>
<style>
  .option-btn { transition: all 0.2s ease; cursor: pointer; }
  .option-btn:hover { transform: translateX(6px); }
  .option-btn.selected { border-color: #e94d5f !important; background: #fff5f6 !important; box-shadow: 0 0 0 3px rgba(233,77,95,0.15); }
  .option-btn.selected .badge { background: #e94d5f !important; color: #fff !important; }
  .bar-fill { transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .slide-up { animation: slideUp 0.6s cubic-bezier(0.23,1,0.32,1); }
  @keyframes slideUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
  .heart-beat { animation: heartBeat 1.2s ease-in-out infinite; }
  @keyframes heartBeat { 0%,100% { transform:scale(1); } 14% { transform:scale(1.12); } 28% { transform:scale(1); } 42% { transform:scale(1.12); } 56% { transform:scale(1); } }
  .confetti { position:fixed; pointer-events:none; animation:confettiFall 2s ease-out forwards; z-index:9999; }
  @keyframes confettiFall { 0% { opacity:1; transform:translateY(-100px) rotate(0deg); } 100% { opacity:0; transform:translateY(100vh) rotate(720deg); } }
  body { background: linear-gradient(135deg, #fdf2f4 0%, #fef9ef 30%, #fdf8f6 60%, #fdf2f4 100%); background-attachment: fixed; }
  .badge { transition: all 0.2s ease; }
</style>
</head>
<body class="min-h-screen font-sans antialiased text-gray-800">

<!-- ===== INTRO PAGE ===== -->
<section id="introPage" class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="max-w-xl w-full text-center">
    <div class="heart-beat text-6xl mb-6">💝</div>
    <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-love-500 to-gold-500 bg-clip-text text-transparent">
      爱的五种语言
    </h1>
    <p class="text-lg text-gray-500 mb-2">Winnie 简版 · 互动测验</p>
    <div class="w-16 h-1 bg-gradient-to-r from-love-400 to-gold-400 mx-auto my-6 rounded-full"></div>
    <p class="text-gray-500 mb-8 max-w-md mx-auto leading-relaxed">
      共 <strong>10 道题</strong>，每题选一个最符合你感觉的选项。<br>约需 2-3 分钟完成。
    </p>
    <div class="flex flex-wrap justify-center gap-2 mb-8">
      <span class="px-3 py-1.5 bg-love-50 text-love-600 rounded-full text-sm font-medium">A 肯定的言语</span>
      <span class="px-3 py-1.5 bg-gold-50 text-gold-700 rounded-full text-sm font-medium">B 高质量的陪伴</span>
      <span class="px-3 py-1.5 bg-orange-50 text-orange-600 rounded-full text-sm font-medium">C 接受礼物</span>
      <span class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-sm font-medium">D 服务的行动</span>
      <span class="px-3 py-1.5 bg-purple-50 text-purple-600 rounded-full text-sm font-medium">E 身体的接触</span>
    </div>
    <button onclick="startQuiz()" class="px-10 py-4 bg-gradient-to-r from-love-500 to-love-600 text-white text-lg font-semibold rounded-2xl shadow-lg shadow-love-200 hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 transition-all">
      开始测验 ✨
    </button>
  </div>
</section>

<!-- ===== QUIZ PAGE ===== -->
<section id="quizPage" class="hidden min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-2">
      <button onclick="prevQuestion()" id="prevBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm hover:shadow-md transition-all text-gray-400 hover:text-gray-600 disabled:opacity-30 disabled:cursor-not-allowed">←</button>
      <div class="text-sm font-medium text-gray-400"><span id="qNum">1</span> / 10</div>
      <div class="w-10 h-10"></div>
    </div>
    <!-- Progress bar -->
    <div class="w-full h-2 bg-gray-200 rounded-full mb-8 overflow-hidden">
      <div id="progressBar" class="h-full bg-gradient-to-r from-love-400 to-love-500 rounded-full transition-all duration-500" style="width:10%"></div>
    </div>
    <!-- Question card -->
    <div id="questionCard" class="bg-white rounded-3xl shadow-xl shadow-gray-100 p-6 md:p-8 mb-6 fade-in">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-8 h-8 rounded-full bg-love-100 text-love-500 flex items-center justify-center text-sm font-bold" id="qBadge">1</span>
        <span class="text-sm text-gray-400 font-medium">选出你最希望别人对你做的那一个</span>
      </div>
      <h3 id="questionTitle" class="text-lg font-semibold text-gray-800 mb-5 leading-relaxed"></h3>
      <div id="optionsContainer" class="space-y-3"></div>
    </div>
    <!-- Navigation -->
    <div class="flex justify-end">
      <button onclick="nextQuestion()" id="nextBtn" class="px-8 py-3 bg-gradient-to-r from-love-500 to-love-600 text-white font-semibold rounded-2xl shadow-lg shadow-love-200 hover:shadow-xl hover:-translate-y-0.5 disabled:opacity-40 disabled:cursor-not-allowed transition-all">
        下一题 →
      </button>
      <button onclick="showResults()" id="submitBtn" class="hidden px-8 py-3 bg-gradient-to-r from-gold-400 to-gold-500 text-white font-semibold rounded-2xl shadow-lg shadow-gold-200 hover:shadow-xl hover:-translate-y-0.5 transition-all">
        查看结果 🎉
      </button>
    </div>
  </div>
</section>

<!-- ===== RESULTS PAGE ===== -->
<section id="resultsPage" class="hidden min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="text-center mb-10 slide-up">
      <div class="text-5xl mb-4">💝</div>
      <h2 class="text-3xl md:text-4xl font-bold mb-2 text-gray-800">你的爱的语言</h2>
      <p class="text-gray-500">以下是你的爱语分布（A-E 对应五大爱语）</p>
    </div>
    
    <!-- Score bars -->
    <div id="scoreBars" class="space-y-5 mb-10 slide-up"></div>
    
    <!-- Interpretation -->
    <div id="interpretation" class="bg-white rounded-3xl shadow-xl shadow-gray-100 p-6 md:p-8 mb-6 slide-up"></div>
    
    <!-- Detail table -->
    <div id="detailTable" class="bg-white rounded-3xl shadow-xl shadow-gray-100 p-6 md:p-8 mb-6 slide-up"></div>
    
    <!-- Actions -->
    <div class="flex flex-wrap gap-3 justify-center slide-up">
      <button onclick="restartQuiz()" class="px-6 py-3 bg-love-50 text-love-600 font-semibold rounded-2xl hover:bg-love-100 transition-all">
        🔄 重新测验
      </button>
      <button onclick="shareResults()" class="px-6 py-3 bg-white text-gray-600 font-semibold rounded-2xl shadow-sm hover:shadow-md transition-all border border-gray-200">
        📋 复制结果
      </button>
    </div>
  </div>
</section>

<script>
// ===== QUIZ DATA — From "Winnie 简版" photos =====
// Options: A=肯定的言语, B=高质量的陪伴, C=接受礼物, D=服务的行动, E=身体的接触
const quizData = [
  {
    title: "当我感觉被爱时，是因为对方：",
    options: {
      A: "跟我说\u201c我很重要\u201d或\u201c我很棒\u201d",
      B: "和我安静地共度时光",
      C: "给我一个贴心的小礼物",
      D: "主动帮我完成一件事",
      E: "拥抱我或拉着我的手"
    }
  },
  {
    title: "我更感动于：",
    options: {
      A: "对方给我写一张暖心卡片",
      B: "一起出去散步或旅行",
      C: "对方给我准备一个特别的惊喜礼物",
      D: "对方帮我解决一项我不喜欢做的家务",
      E: "对方在众人面前自然地搂住我"
    }
  },
  {
    title: "我更希望：",
    options: {
      A: "被表扬和鼓励",
      B: "有人专心听我讲话，不分心看手机",
      C: "节日或非节日都有人送我小东西",
      D: "对方主动承担一些我的负担",
      E: "频繁地有身体接触，比如牵手、依靠"
    }
  },
  {
    title: "如果我难过时，我最希望对方：",
    options: {
      A: "安慰我并用语言鼓励我",
      B: "安静地陪我坐着，哪怕不说话",
      C: "买个我喜欢的东西安慰我",
      D: "替我处理掉一件我正烦的事情",
      E: "给我一个长长的抱抱"
    }
  },
  {
    title: "我觉得爱一个人最重要的是：",
    options: {
      A: "说出你在乎他/她",
      B: "花时间陪伴他/她",
      C: "给对方一些体现心意的小物",
      D: "做实事帮对方分担",
      E: "经常亲昵互动"
    }
  },
  {
    title: "如果我生日，最想收到的礼物是：",
    options: {
      A: "一段写得走心的语音或纸条",
      B: "对方安排好时间专门陪我过一天",
      C: "一个我心心念念的礼物",
      D: "对方帮我完成一个愿望清单里的任务",
      E: "一个温暖的拥抱和亲吻"
    }
  },
  {
    title: "我更希望每天有：",
    options: {
      A: "甜蜜的夸奖或鼓励",
      B: "有意义的共处时光",
      C: "惊喜的小礼物或纪念物",
      D: "有人帮我做小事，比如倒垃圾",
      E: "自然的牵手、靠肩、拥抱"
    }
  },
  {
    title: "当我谈恋爱时，我会觉得：",
    options: {
      A: "对方常说他/她有多爱我让我觉得幸福",
      B: "和对方一起做什么都很开心",
      C: "喜欢被记得、被送礼物",
      D: "我特别感激对方帮我完成任何一件小事",
      E: "我们的身体接触让我觉得很亲密"
    }
  },
  {
    title: "如果对方忙于工作，我最希望他/她：",
    options: {
      A: "抽空发一段鼓励我的话",
      B: "即使再忙也安排一点时间专心陪我",
      C: "下班后给我带一杯我爱喝的饮料",
      D: "忙完之后第一时间帮我处理点事",
      E: "回来之后紧紧地抱我一下"
    }
  },
  {
    title: "如果和我关系最好的人远在他方，我最希望他/她：",
    options: {
      A: "发来一些温暖贴心的话",
      B: "安排好时间专门视频聊聊天",
      C: "快递一个让我开心的礼物",
      D: "远程帮我出点主意/解决问题",
      E: "回来第一件事是给我一个大大的拥抱"
    }
  }
];

// Category info — matching the photo's mapping
const categories = {
  A: { name:"肯定的言语", icon:"💬", color:"love", bg:"bg-red-100", bar:"from-red-400 to-red-300",
       desc:"你喜欢听到肯定、赞美和鼓励的话语。言语对你来说是爱的强有力表达——一句\"你很棒\"、一张暖心卡片、或真诚的称赞都能让你的心充满温暖。",
       tips:["多说肯定和鼓励的话","写便条、发甜蜜语音","在他人面前称赞对方","避免批评和指责"] },
  B: { name:"高质量的陪伴", icon:"⏰", color:"gold", bg:"bg-amber-100", bar:"from-amber-500 to-amber-400",
       desc:"你重视一起度过的专注时光。当你和对方全神贯注地相处——不被手机打扰的聊天、一起散步旅行、或计划好的约会——你感受到深深的爱与连接。",
       tips:["放下手机，专注倾听","计划定期约会和旅行","一起散步或安静共处","创造只属于两人的仪式"] },
  C: { name:"接受礼物", icon:"🎁", color:"warm", bg:"bg-orange-100", bar:"from-orange-500 to-orange-400",
       desc:"礼物在你心中代表着爱与思念。重要的不是价格，而是那份心意——对方为你挑选礼物的用心，让你感受到被珍视。",
       tips:["不一定要贵重，重在心意","出差或逛街时想到对方","节日和日常都可以送","亲手制作更显珍贵"] },
  D: { name:"服务的行动", icon:"🛠️", color:"blue", bg:"bg-blue-100", bar:"from-blue-500 to-blue-400",
       desc:"你从行动中感受爱。当对方帮你做家务、处理琐事、分担负担——这些实际的行动比千言万语更能表达爱。",
       tips:["主动分担家务和琐事","帮对方处理烦心事","用行动代替言语","发现对方需要并悄悄去做"] },
  E: { name:"身体的接触", icon:"🤗", color:"purple", bg:"bg-purple-100", bar:"from-purple-500 to-purple-400",
       desc:"身体接触是你的主要爱语。拥抱、牵手、亲吻——这些肢体接触让你感到安全和被爱。",
       tips:["多拥抱、牵手、亲吻","散步时挽着手","坐在身边而非对面","用肢体语言表达爱意"] },
};

// ===== STATE =====
let currentQ = 0;
let answers = new Array(10).fill(null);

// ===== FUNCTIONS =====
function startQuiz() {
  document.getElementById('introPage').classList.add('hidden');
  document.getElementById('quizPage').classList.remove('hidden');
  document.getElementById('resultsPage').classList.add('hidden');
  currentQ = 0;
  answers = new Array(10).fill(null);
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const optionLabels = ['A','B','C','D','E'];
const optionBadgeColors = {
  A: 'bg-red-50 text-red-500',
  B: 'bg-amber-50 text-amber-600',
  C: 'bg-orange-50 text-orange-600',
  D: 'bg-blue-50 text-blue-600',
  E: 'bg-purple-50 text-purple-600',
};

function renderQuestion() {
  const q = quizData[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('qBadge').textContent = currentQ + 1;
  document.getElementById('questionTitle').textContent = q.title;
  document.getElementById('progressBar').style.width = ((currentQ + 1) / 10 * 100) + '%';
  document.getElementById('prevBtn').disabled = currentQ === 0;
  
  const sel = answers[currentQ];
  const container = document.getElementById('optionsContainer');
  
  let html = '';
  optionLabels.forEach(label => {
    const isSel = sel === label;
    const badgeCls = optionBadgeColors[label];
    html += `
      <button onclick="selectAnswer('${label}')" class="option-btn w-full text-left p-4 rounded-2xl border-2 border-gray-200 bg-white hover:border-love-300 ${isSel?'selected':''}">
        <div class="flex items-start gap-3">
          <span class="badge flex-shrink-0 w-9 h-9 rounded-xl ${badgeCls} flex items-center justify-center font-bold text-sm ${isSel?'!bg-love-500 !text-white':''}">${label}</span>
          <p class="text-gray-700 leading-relaxed pt-1">${q.options[label]}</p>
        </div>
      </button>`;
  });
  container.innerHTML = html;
  
  const nextBtn = document.getElementById('nextBtn');
  const submitBtn = document.getElementById('submitBtn');
  if (currentQ === 9) {
    nextBtn.classList.add('hidden');
    submitBtn.classList.remove('hidden');
  } else {
    nextBtn.classList.remove('hidden');
    submitBtn.classList.add('hidden');
  }
  
  const card = document.getElementById('questionCard');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function selectAnswer(choice) {
  answers[currentQ] = choice;
  renderQuestion();
}

function nextQuestion() {
  if (currentQ < 9) {
    currentQ++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showResults() {
  if (answers.includes(null)) {
    const unanswered = answers.map((a,i) => a===null ? i+1 : null).filter(x => x);
    alert(`还有 ${unanswered.length} 题未回答：第 ${unanswered.slice(0,5).join(', ')} 题`);
    return;
  }
  
  // Count selections per option
  const scores = { A:0, B:0, C:0, D:0, E:0 };
  answers.forEach(a => { scores[a]++; });
  
  // Sort
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  const maxScore = sorted[0][1];
  
  document.getElementById('quizPage').classList.add('hidden');
  document.getElementById('resultsPage').classList.remove('hidden');
  
  // Score bars
  let barsHTML = '';
  sorted.forEach(([cat, score]) => {
    const pct = score > 0 ? Math.round(score / 10 * 100) : 0;
    const info = categories[cat];
    const isTop = score === maxScore && score > 0;
    barsHTML += `
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <span class="font-semibold text-gray-700">${info.icon} ${info.name} ${isTop ? '👑' : ''}</span>
          <span class="text-sm font-bold text-gray-500">${score} / 10</span>
        </div>
        <div class="w-full h-3 rounded-full ${info.bg} overflow-hidden">
          <div class="bar-fill h-full rounded-full bg-gradient-to-r ${info.bar}" style="width:${pct}%"></div>
        </div>
      </div>`;
  });
  document.getElementById('scoreBars').innerHTML = barsHTML;
  
  // Trigger bar animations
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0%';
      void bar.offsetWidth;
      bar.style.width = w;
    });
  }, 100);
  
  // Top love language
  const top = sorted.filter(([,s]) => s === maxScore && s > 0);
  const topInfo = top.length > 0 ? categories[top[0][0]] : null;
  const topNames = top.map(([c]) => categories[c].name).join(' 和 ');
  
  let interpHTML = '';
  if (topInfo) {
    interpHTML = `
      <h3 class="text-xl font-bold mb-4">📖 你的主要爱语：${topNames}</h3>
      <p class="text-gray-600 leading-relaxed mb-4">${topInfo.desc}</p>
      <div class="bg-${topInfo.color}-50 rounded-2xl p-5 mt-4">
        <p class="font-semibold text-gray-700 mb-2">💡 建议：</p>
        <ul class="space-y-2">
          ${topInfo.tips.map(t => `<li class="flex items-start gap-2 text-gray-600"><span>✦</span>${t}</li>`).join('')}
        </ul>
      </div>`;
    if (top.length === 1 && sorted[1][1] > 0) {
      const second = categories[sorted[1][0]];
      interpHTML += `
        <div class="mt-4 p-4 rounded-2xl bg-gray-50">
          <p class="text-sm text-gray-500">📌 你的次要爱语是 <strong>${second.name}</strong>（${sorted[1][1]}分）。在关系中，这两种爱语同样值得关注。</p>
        </div>`;
    }
  }
  document.getElementById('interpretation').innerHTML = interpHTML;
  
  // Detail table: show which option was selected for each question
  let tableHTML = `<h3 class="text-lg font-bold mb-4">📋 答题明细</h3>
    <div class="overflow-x-auto"><table class="w-full text-sm">
    <thead><tr class="border-b border-gray-200">
      <th class="text-left py-2 pr-2 text-gray-400 w-12">#</th>
      <th class="text-left py-2 pr-2 text-gray-400">题目</th>
      <th class="text-center py-2 text-gray-400 w-16">选择</th>
    </tr></thead><tbody>`;
  
  quizData.forEach((q, i) => {
    const ans = answers[i];
    const info = categories[ans];
    tableHTML += `
      <tr class="border-b border-gray-100">
        <td class="py-2 pr-2 text-gray-400">${i+1}</td>
        <td class="py-2 pr-2 text-gray-700">${q.title}</td>
        <td class="py-2 text-center"><span class="inline-block px-2 py-0.5 rounded-lg text-xs font-bold ${optionBadgeColors[ans]}">${ans} ${info.icon}</span></td>
      </tr>`;
  });
  
  tableHTML += '</tbody></table></div>';
  document.getElementById('detailTable').innerHTML = tableHTML;
  
  spawnConfetti();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  currentQ = 0;
  answers = new Array(10).fill(null);
  document.getElementById('resultsPage').classList.add('hidden');
  document.getElementById('quizPage').classList.remove('hidden');
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareResults() {
  const scores = { A:0, B:0, C:0, D:0, E:0 };
  answers.forEach(a => { scores[a]++; });
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const lines = sorted.map(([cat, score]) => {
    const info = categories[cat];
    const bar = '█'.repeat(score) + '░'.repeat(10-score);
    return `${info.icon} ${info.name}: ${bar} ${score}/10`;
  });
  const text = `💝 我的爱的五种语言（Winnie简版）💝\n\n${lines.join('\n')}\n\n🔗 你也来测：5lovelanguages.com`;
  
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 结果已复制到剪贴板！');
  }).catch(() => {
    prompt('📋 手动复制以下结果：', text);
  });
}

function spawnConfetti() {
  const colors = ['#e94d5f','#f5c675','#f97316','#60a5fa','#a78bfa','#34d399','#f472b6'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random()*100 + '%';
      el.style.top = -(Math.random()*40+10) + 'px';
      el.style.width = (Math.random()*10+6) + 'px';
      el.style.height = (Math.random()*14+6) + 'px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random()*2+1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }, i*30);
  }
}
</script>
